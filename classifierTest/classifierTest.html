    // Compute cosine similarity between two vectors
    function cosineSimilarity(vecA, vecB) {
        let dotProduct = 0;
        let normA = 0;
        let normB = 0;

        for (let i = 0; i < vecA.length; i++) {
            dotProduct += vecA[i] * vecB[i];
            normA += vecA[i] * vecA[i];
            normB += vecB[i] * vecB[i];
        }

        return dotProduct / (Math.sqrt(normA) * Math.sqrt(normB));
    }

        if (!useModel) {
            console.error('USE model not loaded yet.');
            return 'random text';
        }

        // Compute embedding for the input text
        const inputEmbedding = await useModel.embed([text]);
        console.log('Computed embedding for input text.');
        const inputArray = inputEmbedding.arraySync()[0];
        inputEmbedding.dispose(); // Free memory

        let highestSimilarity = -1;
        let assignedCategory = 'random text';

        for (const category in embeddings) {
            const categoryEmbedding = embeddings[category];
            var currentDate1 = new Date();
            var minutes1 = currentDate1.getMinutes();
            var seconds1 = currentDate1.getSeconds();
            var milliseconds1 = currentDate1.getMilliseconds();
            console.log(`Current Time: ${minutes1}:${seconds1}:${milliseconds1}`);
            const similarity = cosineSimilarity(inputArray, categoryEmbedding);
            var currentDate2 = new Date();
            var hours2 = currentDate2.getHours();
            var minutes2 = currentDate2.getMinutes();
            var seconds2 = currentDate2.getSeconds();
            var milliseconds2 = currentDate2.getMilliseconds();
            console.log(`Current Time: ${hours2}:${minutes2}:${seconds2}:${milliseconds2}`);
            //console.log(`Similarity with ${category}: ${similarity}`);
            if (similarity > highestSimilarity) {
                highestSimilarity = similarity;
                assignedCategory = category;
            }
        }

        console.log(assignedCategory);
        return assignedCategory;
    }

    // Detect unverified claims using keyword matching
    function detectUnverifiedClaim(text) {
        const claimKeywords = [
            'according to',
            'reportedly',
            'unverified',
            'allegedly',
            'claims that',
            'states that',
            'says that',
            'suggests',
            'argues',
            'asserts',
            'maintains'
        ];
        return claimKeywords.some(keyword => text.toLowerCase().includes(keyword));
    }

    // Highlight the classification result
    function highlightResult(category, isUnverified) {
        const resultDiv = document.getElementById('result');
        resultDiv.className = 'result'; // Reset classes

        switch (category) {
            case 'news title':
                resultDiv.classList.add('title');
                break;
            case 'news description':
                resultDiv.classList.add('description');
                break;
            case 'news article':
                resultDiv.classList.add('article');
                break;
            case 'random text':
                resultDiv.classList.add('random');
                break;
            default:
                break;
        }

        let htmlContent = `<strong>Classification:</strong> ${category.charAt(0).toUpperCase() + category.slice(1)}`;
        if (isUnverified) {
            htmlContent += ` <span class="unverified">(Contains Unverified Claims)</span>`;
        }

        resultDiv.innerHTML = htmlContent;
    }

    // Handle the classification process
    async function handleClassification() {
        const text = document.getElementById('inputText').value.trim();
        if (text.length === 0) {
            alert('Please enter some text to classify.');
            return;
        }

        const category = await classifyText(text);
        const isUnverified = (category === 'news title' || category === 'news description' || category === 'news article') ? detectUnverifiedClaim(text) : false;
        highlightResult(category, isUnverified);
    }

    // Initialize the testing environment
    async function initializeTest() {
        await loadUSEModel();
    }

    // Set up event listeners
    document.getElementById('classifyBtn').addEventListener('click', handleClassification);

    // Start initialization on page load
    window.onload = initializeTest;
</script>
