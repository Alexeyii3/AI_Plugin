<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Powered News Analyzer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<h2>AI-Powered News Analyzer</h2>
<label>
    <input type="checkbox" id="toggle-highlighting"/>
    Enable Content Highlighting
</label>

<h3>Custom News Sites</h3>
<input type="text" id="custom-site-input" placeholder="Enter site domain" />
<button id="add-site-button">Add to News Sites</button>
<button id="remove-site-button">Remove from News Sites</button>

<!-- Make sure you load the correct path for popup.bundle.js -->
<script src="../dist/popup.bundle.js"></script>
</body>
</html>
